<!DOCTYPE html>
<html>
<head>
    <title>Demo Access</title>
    <style>
        body { font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 10px; width: 350px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .info { margin-top: 15px; font-size: 12px; color: #666; }
        h2 { color: #333; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 20px; }
        .back-link { display: inline-block; margin-top: 15px; color: #667eea; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Demo Access</h2>
        <p>For Amazon ML Summer School Reviewers</p>
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <div class="info">
            <strong>Demo Credentials:</strong><br>
            Admin: demo_admin / 12345<br>
            Doctor: demo_doctor / 12345
        </div>
        <a href="/" class="back-link">← Back to Home</a>
    </div>
</body>
</html>
